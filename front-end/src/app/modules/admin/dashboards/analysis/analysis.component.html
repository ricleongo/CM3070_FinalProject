<div class="flex min-w-0 flex-auto flex-col">
    <!-- Main -->
    <div class="-mt-px flex-auto border-t pt-4 sm:pt-6">
        <div class="mx-auto w-full max-w-screen-xl">
            <!-- Tabs -->
            <mat-tab-group class="sm:px-2" mat-stretch-tabs="false" [animationDuration]="'0'">
                <!-- Model Training -->
                <mat-tab label="MD-GCN Evaluation">
                    <ng-template matTabContent>
                        <div class="grid w-full min-w-0 grid-cols-1 gap-6 sm:grid-cols-6">
                            <!-- Model Evaluation Chart -->
                            <div
                                class="bg-card flex flex-auto flex-col overflow-hidden rounded-2xl p-6 shadow sm:col-span-3 lg:col-span-4">
                                <div
                                    class="truncate text-lg font-medium leading-6 tracking-tight flex items-center gap-2">
                                    MD-GCN Model Analysis (
                                    Transductive <span class="inline-block w-6 h-1.5 mb-1 bg-[#6366F1]"></span>
                                    vs
                                    Inductive <span class="inline-block w-6 h-1.5 mb-1 bg-[#22D3EE]"></span>
                                    )
                                </div>
                                <div class="flex flex-auto flex-col">
                                    <apx-chart class="h-[450px] w-full flex-auto" [chart]="chartModelEvaluation.chart"
                                        [colors]="
                                            chartModelEvaluation.colors
                                        " [dataLabels]="
                                            chartModelEvaluation.dataLabels
                                        " [markers]="
                                            chartModelEvaluation.markers
                                        " [plotOptions]="
                                            chartModelEvaluation.plotOptions
                                        " [series]="
                                            chartModelEvaluation.series
                                        " [stroke]="
                                            chartModelEvaluation.stroke
                                        " [tooltip]="
                                            chartModelEvaluation.tooltip
                                        " [xaxis]="chartModelEvaluation.xaxis"
                                        [yaxis]="chartModelEvaluation.yaxis"></apx-chart>
                                </div>
                            </div>

                            <!-- AML Measures -->
                            <div class="grid grid-cols-1 gap-y-6 sm:col-span-3 lg:col-span-2">
                                
                                <!-- Fraud Detected Rate -->
                                <div
                                    class="bg-card flex flex-auto flex-col overflow-hidden rounded-2xl p-6 shadow sm:col-span-2">
                                    <div class="flex items-start justify-between">
                                        <div class="truncate text-lg font-medium leading-6 tracking-tight mb-4">
                                            Fraud Detected Rate
                                        </div>
                                    </div>
                                    <div class="mt-1 flex items-center">
                                        <div class="flex flex-col">
                                            <div class="text-3xl font-semibold leading-tight tracking-tight mb-4">
                                                61.1%
                                            </div>
                                            <div class="flex items-center">
                                                <mat-icon class="mr-1 text-green-500 icon-size-5" [svgIcon]="
                                                        'heroicons_solid:arrow-trending-down'
                                                    "></mat-icon>
                                                <div
                                                    class="text-secondary whitespace-nowrap text-sm font-medium leading-none">
                                                    <span class="text-green-500">2%</span>
                                                    below projected
                                                </div>
                                            </div>
                                        </div>
                                        <div class="ml-8 flex flex-auto flex-col">
                                            <!-- <apx-chart class="h-16 w-full flex-auto" [chart]="
                                                    chartWeeklyExpenses.chart
                                                " [colors]="
                                                    chartWeeklyExpenses.colors
                                                " [series]="
                                                    chartWeeklyExpenses.series
                                                " [stroke]="
                                                    chartWeeklyExpenses.stroke
                                                " [tooltip]="
                                                    chartWeeklyExpenses.tooltip
                                                " [xaxis]="
                                                    chartWeeklyExpenses.xaxis
                                                " [yaxis]="
                                                    chartWeeklyExpenses.yaxis
                                                "></apx-chart> -->
                                        </div>
                                    </div>
                                </div>


                                <!-- False Alert Rate -->
                                <div
                                    class="bg-card flex flex-auto flex-col overflow-hidden rounded-2xl p-6 shadow sm:col-span-2">
                                    <div class="flex items-start justify-between">
                                        <div class="truncate text-lg font-medium leading-6 tracking-tight mb-4">
                                            False Alert Rate
                                        </div>
                                    </div>
                                    <div class="mt-1 flex items-center">
                                        <div class="flex flex-col">
                                            <div class="text-3xl font-semibold leading-tight tracking-tight mb-4">
                                                12.4 %
                                            </div>
                                            <div class="flex items-center">
                                                <mat-icon class="mr-1 text-red-500 icon-size-5" [svgIcon]="
                                                        'heroicons_solid:arrow-trending-up'
                                                    "></mat-icon>
                                                <div
                                                    class="text-secondary whitespace-nowrap text-sm font-medium leading-none">
                                                    <span class="text-red-500">4%</span>
                                                    above projected
                                                </div>
                                            </div>
                                        </div>
                                        <div class="ml-8 flex flex-auto flex-col">
                                            <!-- <apx-chart class="h-16 w-full flex-auto" [chart]="
                                                    chartMonthlyExpenses.chart
                                                " [colors]="
                                                    chartMonthlyExpenses.colors
                                                " [series]="
                                                    chartMonthlyExpenses.series
                                                " [stroke]="
                                                    chartMonthlyExpenses.stroke
                                                " [tooltip]="
                                                    chartMonthlyExpenses.tooltip
                                                " [xaxis]="
                                                    chartMonthlyExpenses.xaxis
                                                " [yaxis]="
                                                    chartMonthlyExpenses.yaxis
                                                "></apx-chart> -->
                                        </div>
                                    </div>
                                </div>


                                <!-- Network Risk Coverage -->
                                <div
                                    class="bg-card flex flex-auto flex-col overflow-hidden rounded-2xl p-6 shadow sm:col-span-2">
                                    <div class="flex items-start justify-between">
                                        <div class="truncate text-lg font-medium leading-6 tracking-tight mb-4">
                                            Network Risk Coverage
                                        </div>
                                    </div>
                                    <div class="mt-1 flex items-center">
                                        <div class="flex flex-col">
                                            <div class="text-3xl font-semibold leading-tight tracking-tight mb-4">
                                                18.7 %
                                            </div>
                                            <div class="flex items-center">
                                                <mat-icon class="mr-1 text-red-500 icon-size-5" [svgIcon]="
                                                        'heroicons_solid:arrow-trending-up'
                                                    "></mat-icon>
                                                <div
                                                    class="text-secondary whitespace-nowrap text-sm font-medium leading-none">
                                                    <span class="text-red-500">3%</span>
                                                    above projected
                                                </div>
                                            </div>
                                        </div>
                                        <div class="ml-8 flex flex-auto flex-col">
                                            <!-- <apx-chart class="h-16 w-full flex-auto" [chart]="
                                                    chartYearlyExpenses.chart
                                                " [colors]="
                                                    chartYearlyExpenses.colors
                                                " [series]="
                                                    chartYearlyExpenses.series
                                                " [stroke]="
                                                    chartYearlyExpenses.stroke
                                                " [tooltip]="
                                                    chartYearlyExpenses.tooltip
                                                " [xaxis]="
                                                    chartYearlyExpenses.xaxis
                                                " [yaxis]="
                                                    chartYearlyExpenses.yaxis
                                                "></apx-chart> -->
                                        </div>
                                    </div>
                                </div>
                            </div>


                        </div>
                    </ng-template>
                </mat-tab>
            </mat-tab-group>
        </div>
    </div>
</div>
